<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, follow">
<title>404 — Page Not Found | Q2 Machines</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Barlow+Condensed:wght@300;400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #F5C500;
    --gold-dark: #C49B00;
    --ink: #0A0A0A;
    --ink-2: #111111;
    --text: #F0F0F0;
    --text-2: #A0A0A0;
    --text-3: #505050;
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--ink);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    padding: 40px 24px;
  }
  .error-code {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(100px, 20vw, 180px);
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
    letter-spacing: -4px;
    opacity: 0.15;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -55%);
    user-select: none;
    pointer-events: none;
  }
  .error-wrap {
    position: relative;
    z-index: 1;
    max-width: 560px;
  }
  .error-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .error-label::before,
  .error-label::after { content: ''; width: 30px; height: 1px; background: var(--gold); }
  h1 {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(32px, 6vw, 52px);
    font-weight: 700;
    letter-spacing: -1px;
    margin-bottom: 16px;
    line-height: 1.1;
  }
  h1 span { color: var(--gold); }
  p {
    font-size: 16px;
    color: var(--text-2);
    line-height: 1.7;
    margin-bottom: 40px;
  }
  .actions {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .btn-primary {
    background: var(--gold);
    color: var(--ink);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 14px 32px;
    text-decoration: none;
    border-radius: 2px;
    transition: background .2s;
  }
  .btn-primary:hover { background: var(--gold-dark); }
  .btn-secondary {
    border: 1px solid var(--text-3);
    color: var(--text-2);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 14px 32px;
    text-decoration: none;
    border-radius: 2px;
    transition: border-color .2s, color .2s;
  }
  .btn-secondary:hover { border-color: var(--gold); color: var(--gold); }
  .logo-mark {
    width: 64px;
    height: 64px;
    margin: 0 auto 32px;
    opacity: 0.6;
  }
  .logo-mark img { width: 100%; height: 100%; object-fit: contain; filter: invert(1); }
</style>
</head>
<body>

<div class="error-code">404</div>

<div class="error-wrap">
  <div class="error-label">Error 404</div>
  <h1>Page <span>Not Found</span></h1>
  <p>The page you're looking for doesn't exist or may have been moved. Let's get you back on track.</p>
  <div class="actions">
    <a href="/" class="btn-primary">← Back to Home</a>
    <a href="/#contact" class="btn-secondary">Contact Us</a>
  </div>
</div>

</body>
</html>
