name: Deploy to cPanel

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Upload changed files to cPanel
        env:
          TOKEN: ${{ secrets.CPANEL_API_TOKEN }}
        run: |
          HOST="https://chi203.greengeeks.net:2083"
          CPANEL_USER="terranre"
          DEPLOY_DIR="/home/terranre/public_html/q2m.io"
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          # workflow_dispatch has no BEFORE; treat as full deploy
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            FILES=$(git ls-files)
          else
            FILES=$(git diff --name-only --diff-filter=ACM "$BEFORE" "$AFTER")
          fi

          FILES=$(echo "$FILES" | grep -Ev '^\.github/|^\.cpanel\.yml$|^handoff\.md$' || true)

          if [ -z "$FILES" ]; then
            echo "No deployable files changed. Done."
            exit 0
          fi

          echo "=== Files to deploy ==="
          echo "$FILES"
          echo "======================"

          # Create required subdirectories before uploading (ignore errors if already exist)
          declare -A SEEN_DIRS
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            SUBDIR=$(dirname "$file")
            [ "$SUBDIR" = "." ] && continue
            CURRENT=""
            IFS='/' read -ra PARTS <<< "$SUBDIR"
            for part in "${PARTS[@]}"; do
              PARENT_PATH="$DEPLOY_DIR${CURRENT:+/$CURRENT}"
              CURRENT="${CURRENT:+$CURRENT/}$part"
              DIR_KEY="$PARENT_PATH/$part"
              if [ -z "${SEEN_DIRS[$DIR_KEY]+x}" ]; then
                echo "â†’ mkdir: $DIR_KEY"
                curl -s -X POST "$HOST/execute/Fileman/mkdir" \
                  -H "Authorization: cpanel $CPANEL_USER:$TOKEN" \
                  --data-urlencode "dir=$PARENT_PATH" \
                  --data-urlencode "name=$part" > /dev/null 2>&1 || true
                SEEN_DIRS[$DIR_KEY]=1
              fi
            done
          done <<< "$FILES"

          # Upload files: multipart for binary (images), save_file_content for text
          FAILED=0
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            [ ! -f "$file" ] && continue

            SUBDIR=$(dirname "$file")
            if [ "$SUBDIR" = "." ]; then
              REMOTE_DIR="$DEPLOY_DIR"
            else
              REMOTE_DIR="$DEPLOY_DIR/$SUBDIR"
            fi

            echo "â†’ Uploading: $file"

            if file --mime "$file" | grep -q "charset=binary"; then
              # Binary file (images, fonts, etc.) â€” use multipart upload
              STATUS=$(curl -s -o result.json -w "%{http_code}" -X POST \
                "$HOST/execute/Fileman/upload_files" \
                -H "Authorization: cpanel $CPANEL_USER:$TOKEN" \
                -F "dir=$REMOTE_DIR" \
                -F "file-1=@$file")
              CPANEL_STATUS=$(jq -r 'if (.status == 1) and ((.data.failed // []) | length == 0) then "1" else "0" end' result.json 2>/dev/null || echo "0")
            else
              # Text file (HTML, CSS, JS, JSON, SVG, etc.) â€” use save_file_content (supports overwrite)
              FNAME=$(basename "$file")
              STATUS=$(curl -s -o result.json -w "%{http_code}" -X POST \
                "$HOST/execute/Fileman/save_file_content" \
                -H "Authorization: cpanel $CPANEL_USER:$TOKEN" \
                --data-urlencode "dir=$REMOTE_DIR" \
                --data-urlencode "file=$FNAME" \
                --data-urlencode "content@$file")
              CPANEL_STATUS=$(python3 -c "import sys,json; d=json.load(open('result.json')); print(d.get('status',0))" 2>/dev/null || echo "0")
            fi

            if [ "$STATUS" != "200" ] || [ "$CPANEL_STATUS" != "1" ]; then
              echo "  âś– FAILED (HTTP $STATUS, cPanel status $CPANEL_STATUS)"
              cat result.json
              FAILED=1
            else
              echo "  âś” OK"
            fi
          done <<< "$FILES"

          if [ "$FAILED" = "1" ]; then
            echo "One or more files failed to upload."
            exit 1
          fi
